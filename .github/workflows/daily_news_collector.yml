# DEPRECATED
# Replaced by scheduled_collector.yml
name: Daily News Collector

on:
  schedule:
    # 8:00 AM Korea time = 23:00 UTC previous day
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        run: |
          python news_collector.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f output
          if git diff --cached --quiet; then
            echo "No output changes to commit"
            exit 0
          fi
          git commit -m "Daily news collector output update"
          git push
